<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#01BB94">
    <title>Стоматологические материалы | Учебный портал</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='70' text-anchor='middle' fill='%2301BB94'%3E🦷%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <button id="logout-btn" class="logout-fixed">
        <i class="fas fa-sign-out-alt"></i>
    </button>

    <div class="header">
        <div class="header-content">
            <div class="header-logo-container">
                <img src="/static/imgs/logo.png" alt="Стоматология лого" class="header-logo" onerror="this.style.display='none'">
                <div class="header-text">
                    <h1><i class="fas fa-tooth"></i> <span>Учебные материалы по ортопедической стоматологии</span></h1>
                    <p><i class="fas fa-graduation-cap"></i> 3-5 курсы</p>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" 
                           id="search-input" 
                           placeholder="Поиск по названиям материалов..." 
                           autocomplete="off">
                    <button id="search-clear" class="search-clear" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="tree-panel">
            <div class="tree-header">
                <h2><i class="fas fa-folder-open"></i> Материалы</h2>
            </div>
            <div class="tree-content">
                <div class="navigation-bar">
                    <button class="back-btn" id="back-btn">
                        <i class="fas fa-arrow-left"></i> Назад
                    </button>
                    <button class="root-path-btn" id="root-path-btn">
                        <i class="fas fa-folder"></i> Корневая папка
                    </button>
                    <div class="current-path" id="current-path">
                        <i class="fas fa-folder"></i> <span>Корневая папка</span>
                    </div>
                </div>
                
                <div class="content-container" id="content-container">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-pulse fa-2x"></i>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="/static/js/app.js"></script>
</body>
</html>
